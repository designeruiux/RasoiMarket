<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rasoi Market</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">



    <link href="https://fonts.googleapis.com/css2?family=Hind+Vadodara:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

<nav class="navbar">
    <div class="container d-flex align-items-center justify-content-between">

        <!-- Logo Left -->
        <div>
            <img src="./images/logo.svg" alt="Logo" style="height: 57px;">
        </div>

        <!-- Center Menu -->
        <div class="text-center">
            <a href="index.html">
                <button class="btn btn-light ">🧾 Menu</button>
            </a>
        </div>

        <!-- Right Contact -->
        <div>
            <a href="contact.html">
                <button class="btn btn-light active-btn ">Contact</button>
            </a>
        </div>

    </div>
</nav>



    <div class="container mt-4 mb-4">


        <div class="contact-box">
            <div class="row justify-content-center text-center g-3">

                <!-- Phone -->
                <div class="col-6 col-md-3">
                    <div class="info-box p-3">
                        <i class="fas fa-phone-alt"></i>
                        <h6>Phone</h6>
                        <p>+91 98765 43210</p>
                    </div>
                </div>

                <!-- Email -->
                

                <!-- WhatsApp -->
                <div class="col-6 col-md-3">
                    <div class="info-box p-3">
                        <i class="fab fa-whatsapp"></i>
                        <h6>WhatsApp</h6>
                        <p>+91 98765 43210</p>
                    </div>
                </div>

                <!-- Address -->
                <div class="col-12 col-md-5">
                    <div class="info-box p-3">
                        <i class="fas fa-map-marker-alt"></i>
                        <h6>Address</h6>
                        <p>Surat, Gujarat</p>
                    </div>
                </div>

            </div>



            <div class="container contact-form mt-4">
                <h5 class="menu-title text-center mb-3 ">Contact Us Form</h5>
                <!-- Name -->
                <div class="row mb-2">
                    <div class="col-3 col-md-4 form-label">Name</div>
                    <div class="col-9 col-md-8">
                        <input type="text" id="name" class="form-control" placeholder="Enter your name">
                    </div>
                </div>

                <!-- Phone -->
                <div class="row mb-2">
                    <div class="col-3 col-md-4 form-label">Phone</div>
                    <div class="col-9 col-md-8">
                        <input type="tel" id="phone" class="form-control" placeholder="Enter your phone">
                    </div>
                </div>

                <!-- Email -->
                <div class="row mb-2">
                    <div class="col-3 col-md-4 form-label">Email</div>
                    <div class="col-9 col-md-8">
                        <input type="email" id="email" class="form-control" placeholder="Enter your email">
                    </div>
                </div>

                <!-- Message -->
                <div class="row mb-2">
                    <div class="col-3 col-md-4 form-label">Message</div>
                    <div class="col-9 col-md-8">
                        <textarea class="form-control" id="message" rows="3" placeholder="Your message"></textarea>
                    </div>
                </div>
                <div id="errorMsg" style="color:red; text-align:center;"></div>
                <!-- Button -->
                <div class="text-center mt-3">
                    <button class="btn btn-add px-4" onclick="sendToWhatsApp()" >Send Message</button>
                </div>


            </div>


        </div>

    </div>



<script>
    function sendToWhatsApp() {
        let nameField = document.getElementById("name");
        let phoneField = document.getElementById("phone");
        let emailField = document.getElementById("email");
        let messageField = document.getElementById("message");

        let name = nameField.value.trim();
        let phone = phoneField.value.trim();
        let email = emailField.value.trim();
        let message = messageField.value.trim();

        let error = document.getElementById("errorMsg");

        if (name === "" || phone === "" || email === "" || message === "") {
            error.innerText = "Please fill all fields!";
            return;
        } else {
            error.innerText = "";
        }

        let whatsappNumber = "919999999999";

        let text = `Name: ${name}%0A
        Phone: ${phone}%0A
        Email: ${email}%0A
        Message: ${message}`;

        let url = `https://wa.me/${whatsappNumber}?text=${text}`;

        window.open(url, '_blank');

        //  Form clear
        nameField.value = "";
        phoneField.value = "";
        emailField.value = "";
        messageField.value = "";
    }
</script>
<script>
  
    let fields = ["name", "phone", "email", "message"];

    fields.forEach(id => {
        document.getElementById(id).addEventListener("input", function () {
            let error = document.getElementById("errorMsg");
            error.innerText = "";
        });
    });
</script>

    <script src="script.js"></script>

    

</body>

</html>
